# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to used for "slug" (head_desc)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created
# in the script location
# sourceless = false

# version location specification; this defaults
# to migrations/versions.  when using multiple version
# directories, paths must be separated by spaces or carriage returns
# version_locations = %(here)s/bar %(here)s/bat migrations/versions

# version_path_separator = :

# set to 'true' to search for newer versions of migrations in the
# version_locations directory
# new_version_on_newer_location = false

# the command line client to use when executing commands
# via alembic.command.* functions
# command_executor = python

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/epmp

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
